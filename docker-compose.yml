version: "3.8"

services:
  backend:
    build: ./backend
    container_name: rabbitt-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:5000
    container_name: rabbitt-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
